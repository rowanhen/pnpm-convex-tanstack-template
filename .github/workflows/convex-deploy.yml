name: Deploy Convex

on:
  push:
    branches: [main]
    paths:
      - 'convex/**'
      - 'packages/shared/**'
      - '.env.prod'

jobs:
  deploy-convex:
    name: Deploy to Convex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install dotenvx
        run: npm install -g @dotenvx/dotenvx

      - name: Sync env vars to Convex
        run: bash scripts/sync-env-to-convex.sh --prod
        env:
          DOTENV_PRIVATE_KEY_PROD: ${{ secrets.DOTENV_PRIVATE_KEY_PROD }}

      - name: Deploy to Convex
        run: dotenvx run -f .env.prod -- npx convex deploy
        env:
          DOTENV_PRIVATE_KEY_PROD: ${{ secrets.DOTENV_PRIVATE_KEY_PROD }}
